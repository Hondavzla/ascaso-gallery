services:
  - type: web
    name: ascaso-gallery-api
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && flask db upgrade"
    startCommand: "gunicorn wsgi:app --workers 2 --timeout 60"
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_ENV
        value: prod
      - key: FLASK_APP
        value: wsgi.py
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ascaso-gallery-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: CLOUDINARY_URL
        sync: false

databases:
  - name: ascaso-gallery-db
    plan: free
    postgresMajorVersion: "16"
